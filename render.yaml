services:
  - type: web
    name: ombre-brain
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_API_KEY
        sync: false          # Set in Render dashboard > Environment (any OpenAI-compatible key)
      - key: OMBRE_BASE_URL
        sync: false          # e.g. https://api.deepseek.com/v1 or https://api.siliconflow.cn/v1
      - key: OMBRE_DEHYDRATION_MODEL
        value: deepseek-v4-flash
      - key: OMBRE_EMBEDDING_API_KEY
        sync: false          # Set in Render dashboard > Environment (Gemini API key)
      - key: OMBRE_EMBEDDING_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: OMBRE_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: OMBRE_BUCKETS_DIR
        value: /opt/render/project/src/buckets
    disk:
      name: ombre-buckets
      mountPath: /opt/render/project/src/buckets
      sizeGB: 1
